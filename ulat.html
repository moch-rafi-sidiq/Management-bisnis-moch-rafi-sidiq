    <style>
        .slide-up {
            animation: slideUp 0.25s ease-out;
        }
        @keyframes slideUp {
            from {
                transform: translateY(40px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .modal-backdrop {
            backdrop-filter: blur(4px);
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .trans-item:active {
            transform: scale(0.98);
        }
        .filter-btn.active {
            background: #2d2a24;
            color: #f5ede2;
            border-color: #2d2a24;
        }
        .filter-btn {
            transition: all 0.15s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .filter-btn:active {
            transform: scale(0.95);
        }
        .rekap-item {
            border-bottom: 1px solid #e8dfd3;
        }
        .rekap-item:last-child {
            border-bottom: none;
        }
        .tab-btn.active {
            background: #b8860b;
            color: white;
        }
        .tab-btn {
            transition: all 0.15s;
        }
        .tab-btn:active {
            transform: scale(0.95);
        }
        .growth-status {
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .growth-status.done {
            background: #d4edda;
            color: #1f7a47;
        }
        .growth-status.fail {
            background: #f8d7da;
            color: #b13e3e;
        }
        .growth-status.pending {
            background: #f1e5cf;
            color: #8b6f3f;
        }
    </style>
</head>

        // ================================================================
        //  LOAD & SAVE
        // ================================================================
        function loadData() {
            // Load transaksi
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    transaksi = JSON.parse(stored);
                } catch {
                    transaksi = [];
                }
            } else {
                transaksi = getDataAwal();
                saveData();
            }
            transaksi.sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal));

            // Load growth
            const storedGrowth = localStorage.getItem(GROWTH_KEY);
            if (storedGrowth) {
                try {
                    growthData = JSON.parse(storedGrowth);
                } catch {
                    growthData = [];
                }
            } else {
                growthData = getGrowthAwal();
                saveGrowth();
            }
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(transaksi));
        }

        function saveGrowth() {
            localStorage.setItem(GROWTH_KEY, JSON.stringify(growthData));
        }

        // ================================================================
        function formatRupiah(n) {
            return 'Rp ' + n.toLocaleString('id-ID');
        }

        function formatTgl(tgl) {
            const d = new Date(tgl + 'T00:00:00');
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
            return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
        }

        function getBulanKey(tgl) {
            const d = new Date(tgl + 'T00:00:00');
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
        }

        function getBulanLabel(key) {
            if (key === 'semua') return 'Semua';
            const [thn, bln] = key.split('-');
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
            return months[parseInt(bln) - 1] + ' ' + thn;
        }

        function getBulanList() {
            const set = new Set();
            transaksi.forEach(t => {
                set.add(getBulanKey(t.tanggal));
            });
            return Array.from(set).sort();
        }

        function renderFilter() {
    const wrap = document.getElementById('filterWrap');
    const bulanList = getBulanList();

    let html = `
        <button class="filter-btn px-4 py-1.5 rounded-full border-2 border-[#d6cbbc] text-sm font-medium ${
            filterBulan === 'semua'
                ? 'active bg-[#2d2a24] text-white border-[#2d2a24]'
                : 'bg-white text-[#4d4337]'
        }" data-bulan="semua">
            📅 Semua
        </button>
    `;

    bulanList.forEach(b => {
        html += `
            <button class="filter-btn px-4 py-1.5 rounded-full border-2 border-[#d6cbbc] text-sm font-medium ${
                filterBulan === b
                    ? 'active bg-[#2d2a24] text-white border-[#2d2a24]'
                    : 'bg-white text-[#4d4337]'
            }" data-bulan="${b}">
                ${getBulanLabel(b)}
            </button>
        `;
    });

    wrap.innerHTML = html;

    wrap.querySelectorAll('.filter-btn').forEach(btn => {
        btn.onclick = function () {
            filterBulan = this.dataset.bulan;
            showAll = false;
            renderAll();
        };
    });
}

        function renderRekapBulanan() {
            const list = document.getElementById('rekapList');
            const bulanList = getBulanList();

            if (bulanList.length === 0) {
                list.innerHTML = `<div class="text-center text-xs text-[#8a7d6b] py-2">Belum ada data</div>`;
                return;
            }

            let html = '';
            const sorted = [...bulanList].sort().reverse();
            sorted.forEach(key => {
                const filtered = transaksi.filter(t => getBulanKey(t.tanggal) === key);
                let totalIn = 0,
                    totalOut = 0;
                filtered.forEach(t => {
                    if (t.jenis === 'pemasukan') totalIn += t.jumlah;
                    else totalOut += t.jumlah;
                });
                const saldo = totalIn - totalOut;
                const label = getBulanLabel(key);
                const isActive = filterBulan === key;

                html += `
                    <div class="rekap-item py-1.5 flex justify-between text-sm ${isActive ? 'bg-[#f8f3eb] -mx-1 px-1 rounded' : ''}">
                        <span class="font-medium text-[#2d2a24]">${label}</span>
                        <span class="text-green-700">${formatRupiah(totalIn)}</span>
                        <span class="text-red-600">${formatRupiah(totalOut)}</span>
                        <span class="font-semibold ${saldo >= 0 ? 'text-green-700' : 'text-red-600'}">${formatRupiah(saldo)}</span>
                    </div>
                `;
            });

            list.innerHTML = html;
        }

        function renderTransaksi() {
            const list = document.getElementById('transaksiList');
            const judul = document.getElementById('judulList');
            const jumlahFilter = document.getElementById('jumlahFilter');

            let filtered = transaksi;
            if (filterBulan !== 'semua') {
                filtered = filtered.filter(t => getBulanKey(t.tanggal) === filterBulan);
            }

            const displayed = showAll ? filtered : filtered.slice(0, 5);

            const bulanLabel = filterBulan === 'semua' ? 'Semua' : getBulanLabel(filterBulan);
            judul.textContent = `📋 Transaksi ${bulanLabel}`;
            jumlahFilter.textContent = `${filtered.length} transaksi`;

            if (displayed.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-12 text-[#8a7d6b]">
                        <span class="text-4xl block mb-2">📭</span>
                        <p>Tidak ada transaksi</p>
                        <p class="text-sm">Klik "Tambah Transaksi" untuk mulai</p>
                    </div>
                `;
                return;
            }

            let html = '';
            displayed.forEach(t => {
                const isIncome = t.jenis === 'pemasukan';
                const icon = isIncome ? '' : '';
                const amountClass = isIncome ? 'text-green-700' : 'text-red-600';
                const sign = isIncome ? '+' : '-';

                html += `
                    <div class="bg-white rounded-2xl px-4 py-3 flex justify-between items-center shadow-sm border border-[#e8dfd3] trans-item cursor-pointer" data-id="${t.id}">
                        <div class="flex-1 min-w-0">
                            <span class="text-xs text-[#8a7d6b] font-medium">${icon} ${formatTgl(t.tanggal)}</span>
                            <p class="text-sm font-medium text-[#2d2a24] truncate">${t.deskripsi}</p>
                        </div>
                        <div class="flex items-center gap-3 flex-shrink-0 ml-3">
                            <span class="font-bold text-sm ${amountClass}">${sign} ${formatRupiah(t.jumlah)}</span>
                            <button class="btn-del text-[#b1a18c] hover:text-red-500 text-lg px-1" data-id="${t.id}">✕</button>
                        </div>
                    </div>
                `;
            });
            list.innerHTML = html;

            list.querySelectorAll('.trans-item').forEach(item => {
                item.addEventListener('click', function(e) {
                    if (e.target.closest('.btn-del')) return;
                    const id = parseFloat(this.dataset.id);
                    editTransaksi(id);
                });
            });

            list.querySelectorAll('.btn-del').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const id = parseFloat(this.dataset.id);
                    if (confirm('Hapus transaksi ini?')) {
                        hapusTransaksi(id);
                    }
                });
            });

            const btnLihat = document.getElementById('btnLihatSemua');
            if (filtered.length > 5) {
                btnLihat.classList.remove('hidden');
                btnLihat.textContent = showAll ? '📊 Tampilkan 5 Terakhir' :
                    `📊 Lihat Semua (${filtered.length} transaksi)`;
            } else {
                btnLihat.classList.add('hidden');
            }
        }

        function renderSaldo() {
            let totalIn = 0,
                totalOut = 0;
            transaksi.forEach(t => {
                if (t.jenis === 'pemasukan') totalIn += t.jumlah;
                else totalOut += t.jumlah;
            });
            const saldo = totalIn - totalOut;

            document.getElementById('totalPemasukan').textContent = formatRupiah(totalIn);
            document.getElementById('totalPengeluaran').textContent = formatRupiah(totalOut);

            const elSaldo = document.getElementById('saldoTotal');
            elSaldo.textContent = formatRupiah(saldo);
            elSaldo.className = 'text-3xl font-bold ' + (saldo >= 0 ? 'text-green-400' : 'text-red-400');

            document.getElementById('totalTransaksi').textContent = transaksi.length + ' transaksi';
        }

        // ================================================================
        //  RENDER PERTUMBUHAN
        // ================================================================
        function getKategoriLabel(kategori) {
            const map = {
                'pindah': '🔄 Pindah Media',
                'kepompong': '🟤 Kepompong',
                'kepik': '🐞 Kepik',
                'panen': '🌾 Panen'
            };
            return map[kategori] || kategori;
        }

        function getStatusLabel(status) {
            const map = {
                'done': '✅ Selesai',
                'pending': '⏳ Menunggu',
                'fail': '❌ Gagal'
            };
            return map[status] || status;
        }

        function renderGrowthFilter() {

    const wrap = document.getElementById("growthFilterWrap");

    const kategoriList = [
        "semua",
        "pindah",
        "kepompong",
        "kepik",
        "panen"
    ];

    let html = "";

    kategoriList.forEach(k=>{

        const label = k==="semua"
            ? "📋 Semua"
            : getKategoriLabel(k);

        html += `
            <button
                class="filter-btn px-4 py-1.5 rounded-full border-2 border-[#d6cbbc] text-sm font-medium ${
                    filterKategori===k
                        ? "active bg-[#2d2a24] text-white border-[#2d2a24]"
                        : "bg-white text-[#4d4337]"
                }"
                data-kategori="${k}">
                ${label}
            </button>
        `;

    });

    wrap.innerHTML = html;

    wrap.querySelectorAll(".filter-btn").forEach(btn=>{

        btn.onclick=function(){

            filterKategori=this.dataset.kategori;

            renderGrowthFilter();

            renderGrowth();

        };

    });

}

        function renderGrowth() {
            const list = document.getElementById('growthList');

            let filtered = growthData;
            if (filterKategori !== 'semua') {
                filtered = filtered.filter(g => g.kategori === filterKategori);
            }

            // Sort by kategori then gen
            const kategoriOrder = { 'pindah': 1, 'kepompong': 2, 'kepik': 3, 'panen': 4 };
            filtered.sort((a, b) => {
                if (kategoriOrder[a.kategori] !== kategoriOrder[b.kategori]) {
                    return kategoriOrder[a.kategori] - kategoriOrder[b.kategori];
                }
                return a.gen.localeCompare(b.gen);
            });

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-12 text-[#8a7d6b]">
                        <span class="text-4xl block mb-2">🌱</span>
                        <p>Belum ada data pertumbuhan</p>
                        <p class="text-sm">Klik "Tambah Data Pertumbuhan" untuk mulai</p>
                    </div>
                `;
                return;
            }

            let html = '';
            let currentKategori = '';
            filtered.forEach(g => {
                const statusClass = g.status;
                const statusLabel = getStatusLabel(g.status);

                if (g.kategori !== currentKategori) {
                    currentKategori = g.kategori;
                    html += `
                        <div class="bg-white rounded-2xl p-3 shadow-sm border border-[#e8dfd3] mt-3 first:mt-0">
                            <p class="text-xs font-semibold text-[#8a7d6b] uppercase tracking-wider mb-2">${getKategoriLabel(g.kategori)}</p>
                    `;
                }

                html += `
                    <div class="growth-item flex justify-between items-center py-2 border-b border-[#f0e9df] last:border-0 cursor-pointer" data-id="${g.id}">
                        <div>
                            <span class="font-medium text-sm text-[#2d2a24]">${g.gen}</span>
                            <span class="text-xs text-[#8a7d6b] ml-2">${g.tgl}</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="growth-status ${statusClass}">${statusLabel}</span>
                            <button class="btn-del-growth text-[#b1a18c] hover:text-red-500 text-lg px-1" data-id="${g.id}">✕</button>
                        </div>
                    </div>
                `;

                // Close kategori div after last item of that kategori
                const nextIndex = filtered.indexOf(g) + 1;
                if (nextIndex === filtered.length || filtered[nextIndex].kategori !== g.kategori) {
                    html += `</div>`;
                }
            });

            list.innerHTML = html;

            // Click item to edit
            list.querySelectorAll('.growth-item').forEach(item => {
                item.addEventListener('click', function(e) {
                    if (e.target.closest('.btn-del-growth')) return;
                    const id = parseFloat(this.dataset.id);
                    editGrowth(id);
                });
            });

            // Delete
            list.querySelectorAll('.btn-del-growth').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const id = parseFloat(this.dataset.id);
                    if (confirm('Hapus data pertumbuhan ini?')) {
                        hapusGrowth(id);
                    }
                });
            });

            renderGrowthStats();
        }

        function renderGrowthStats() {
            const stats = document.getElementById('growthStats');
            const total = growthData.length;
            const done = growthData.filter(g => g.status === 'done').length;
            const pending = growthData.filter(g => g.status === 'pending').length;
            const fail = growthData.filter(g => g.status === 'fail').length;

            let html = `
                <div class="bg-[#f8f3eb] rounded-xl p-2 text-center">
                    <p class="text-xs text-[#8a7d6b]">Total Data</p>
                    <p class="font-bold text-lg">${total}</p>
                </div>
                <div class="bg-green-50 rounded-xl p-2 text-center">
                    <p class="text-xs text-[#8a7d6b]">✅ Selesai</p>
                    <p class="font-bold text-lg text-green-700">${done}</p>
                </div>
                <div class="bg-yellow-50 rounded-xl p-2 text-center">
                    <p class="text-xs text-[#8a7d6b]">⏳ Menunggu</p>
                    <p class="font-bold text-lg text-yellow-700">${pending}</p>
                </div>
                <div class="bg-red-50 rounded-xl p-2 text-center">
                    <p class="text-xs text-[#8a7d6b]">❌ Gagal</p>
                    <p class="font-bold text-lg text-red-700">${fail}</p>
                </div>
            `;

            stats.innerHTML = html;
        }

        // ================================================================
        //  CRUD KEUANGAN
        // ================================================================
        function tambahTransaksi(tgl, deskripsi, jenis, jumlah) {
            const newT = {
                id: Date.now() + Math.random() * 1000,
                tanggal: tgl,
                deskripsi: deskripsi.trim(),
                jenis,
                jumlah: parseInt(jumlah)
            };
            transaksi.push(newT);
            transaksi.sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal));
            saveData();
            renderAll();
        }

        function editTransaksi(id) {
            const t = transaksi.find(item => item.id === id);
            if (!t) return;
            editingId = id;
            document.getElementById('modalTitle').textContent = 'Edit Transaksi';
            document.getElementById('inputJenis').value = t.jenis;
            document.getElementById('inputTanggal').value = t.tanggal;
            document.getElementById('inputDeskripsi').value = t.deskripsi;
            document.getElementById('inputJumlah').value = t.jumlah;
            document.getElementById('btnHapus').classList.remove('hidden');
            document.getElementById('modalOverlay').classList.remove('hidden');
        }

        function simpanTransaksi() {
            const jenis = document.getElementById('inputJenis').value;
            const tanggal = document.getElementById('inputTanggal').value;
            const deskripsi = document.getElementById('inputDeskripsi').value.trim();
            const jumlah = parseInt(document.getElementById('inputJumlah').value);

            if (!tanggal || !deskripsi || !jumlah || jumlah <= 0) {
                alert('Harap isi semua data dengan benar!');
                return;
            }

            if (editingId) {
                const idx = transaksi.findIndex(t => t.id === editingId);
                if (idx !== -1) {
                    transaksi[idx] = { ...transaksi[idx], tanggal, deskripsi, jenis, jumlah };
                    transaksi.sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal));
                    saveData();
                    renderAll();
                }
                editingId = null;
            } else {
                tambahTransaksi(tanggal, deskripsi, jenis, jumlah);
            }

            closeModal();
        }

        function hapusTransaksi(id) {
            transaksi = transaksi.filter(t => t.id !== id);
            saveData();
            renderAll();
            if (editingId === id) closeModal();
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.add('hidden');
            document.getElementById('btnHapus').classList.add('hidden');
            editingId = null;
            document.getElementById('modalTitle').textContent = 'Tambah Transaksi';
            document.getElementById('inputJenis').value = 'pemasukan';
            document.getElementById('inputTanggal').value = '';
            document.getElementById('inputDeskripsi').value = '';
            document.getElementById('inputJumlah').value = '';
        }

        // ================================================================
        //  CRUD PERTUMBUHAN
        // ================================================================
        function tambahGrowth(kategori, gen, tgl, status) {
            const newG = {
                id: Date.now() + Math.random() * 1000,
                kategori: kategori,
                gen: gen.trim(),
                tgl: tgl.trim(),
                status: status
            };
            growthData.push(newG);
            saveGrowth();
            renderGrowth();
        }

        function editGrowth(id) {
            const g = growthData.find(item => item.id === id);
            if (!g) return;
            editingGrowthId = id;
            document.getElementById('modalGrowthTitle').textContent = 'Edit Data Pertumbuhan';
            document.getElementById('inputGrowthKategori').value = g.kategori;
            document.getElementById('inputGrowthGen').value = g.gen;
            document.getElementById('inputGrowthTgl').value = g.tgl;
            document.getElementById('inputGrowthStatus').value = g.status;
            document.getElementById('btnHapusGrowth').classList.remove('hidden');
            document.getElementById('modalGrowthOverlay').classList.remove('hidden');
        }

        function simpanGrowth() {
            const kategori = document.getElementById('inputGrowthKategori').value;
            const gen = document.getElementById('inputGrowthGen').value.trim();
            const tgl = document.getElementById('inputGrowthTgl').value.trim();
            const status = document.getElementById('inputGrowthStatus').value;

            if (!gen || !tgl) {
                alert('Harap isi Generasi dan Tanggal!');
                return;
            }

            if (editingGrowthId) {
                const idx = growthData.findIndex(g => g.id === editingGrowthId);
                if (idx !== -1) {
                    growthData[idx] = { ...growthData[idx], kategori, gen, tgl, status };
                    saveGrowth();
                    renderGrowth();
                }
                editingGrowthId = null;
            } else {
                tambahGrowth(kategori, gen, tgl, status);
            }

            closeModalGrowth();
        }

        function hapusGrowth(id) {
            growthData = growthData.filter(g => g.id !== id);
            saveGrowth();
            renderGrowth();
            if (editingGrowthId === id) closeModalGrowth();
        }

        function closeModalGrowth() {
            document.getElementById('modalGrowthOverlay').classList.add('hidden');
            document.getElementById('btnHapusGrowth').classList.add('hidden');
            editingGrowthId = null;
            document.getElementById('modalGrowthTitle').textContent = 'Tambah Data Pertumbuhan';
            document.getElementById('inputGrowthKategori').value = 'pindah';
            document.getElementById('inputGrowthGen').value = '';
            document.getElementById('inputGrowthTgl').value = '';
            document.getElementById('inputGrowthStatus').value = 'pending';
        }

        // ================================================================
        //  RENDER ALL
        // ================================================================
        function renderAll() {
            renderFilter();
            renderRekapBulanan();
            renderTransaksi();
            renderSaldo();
        }

        // ================================================================
        //  TAB NAVIGATION
        // ================================================================
        function switchTab(tab) {
            const tabKeuangan = document.getElementById('tabKeuangan');
            const tabPertumbuhan = document.getElementById('tabPertumbuhan');
            const buttons = document.querySelectorAll('.tab-btn');

            buttons.forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.tab === tab) {
                    btn.classList.add('active');
                }
            });

            if (tab === 'keuangan') {
                tabKeuangan.classList.remove('hidden');
                tabPertumbuhan.classList.add('hidden');
                renderAll();
            } else {
                tabKeuangan.classList.add('hidden');
                tabPertumbuhan.classList.remove('hidden');
                renderGrowthFilter();
                renderGrowth();
            }
        }

        // ================================================================
        //  EVENT LISTENERS
        // ================================================================
        document.addEventListener('DOMContentLoaded', function() {
            loadData();

            // Default: tab keuangan
            switchTab('keuangan');

            // Tab buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    switchTab(this.dataset.tab);
                });
            });

            // ===== KEUANGAN =====
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('inputTanggal').value = today;

            document.getElementById('btnTambah').addEventListener('click', function() {
                editingId = null;
                document.getElementById('modalTitle').textContent = 'Tambah Transaksi';
                document.getElementById('btnHapus').classList.add('hidden');
                document.getElementById('inputJenis').value = 'pemasukan';
                document.getElementById('inputTanggal').value = new Date().toISOString().split('T')[0];
                document.getElementById('inputDeskripsi').value = '';
                document.getElementById('inputJumlah').value = '';
                document.getElementById('modalOverlay').classList.remove('hidden');
            });

            document.getElementById('btnLihatSemua').addEventListener('click', function() {
                showAll = !showAll;
                renderAll();
            });

            document.getElementById('btnSimpan').addEventListener('click', simpanTransaksi);
            document.getElementById('btnBatal').addEventListener('click', closeModal);

            document.getElementById('btnHapus').addEventListener('click', function() {
                if (editingId && confirm('Yakin hapus transaksi ini?')) {
                    hapusTransaksi(editingId);
                }
            });

            document.getElementById('modalOverlay').addEventListener('click', function(e) {
                if (e.target === this) closeModal();
            });

            document.getElementById('inputJumlah').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') simpanTransaksi();
            });

            // ===== PERTUMBUHAN =====
            document.getElementById('btnTambahGrowth').addEventListener('click', function() {
                editingGrowthId = null;
                document.getElementById('modalGrowthTitle').textContent = 'Tambah Data Pertumbuhan';
                document.getElementById('btnHapusGrowth').classList.add('hidden');
                document.getElementById('inputGrowthKategori').value = 'pindah';
                document.getElementById('inputGrowthGen').value = '';
                document.getElementById('inputGrowthTgl').value = '';
                document.getElementById('inputGrowthStatus').value = 'pending';
                document.getElementById('modalGrowthOverlay').classList.remove('hidden');
            });

            document.getElementById('btnSimpanGrowth').addEventListener('click', simpanGrowth);
            document.getElementById('btnBatalGrowth').addEventListener('click', closeModalGrowth);

            document.getElementById('btnHapusGrowth').addEventListener('click', function() {
                if (editingGrowthId && confirm('Yakin hapus data pertumbuhan ini?')) {
                    hapusGrowth(editingGrowthId);
                }
            });

            document.getElementById('modalGrowthOverlay').addEventListener('click', function(e) {
                if (e.target === this) closeModalGrowth();
            });

            document.getElementById('inputGrowthGen').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') simpanGrowth();
            });
            document.getElementById('inputGrowthTgl').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') simpanGrowth();
            });
        });
    </script>

</body>
</html>
