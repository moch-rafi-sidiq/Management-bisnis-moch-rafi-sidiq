<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Bisnis Dedak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .slide-up {
            animation: slideUp 0.25s ease-out;
        }
        @keyframes slideUp {
            from {
                transform: translateY(40px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .modal-backdrop {
            backdrop-filter: blur(4px);
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .item-card:active {
            transform: scale(0.98);
        }
        .tab-btn.active {
            background: #b8860b;
            color: white;
        }
        .tab-btn {
            transition: all 0.15s;
        }
        .tab-btn:active {
            transform: scale(0.95);
        }
        .filter-btn.active {
            background: #2d2a24;
            color: #f5ede2;
            border-color: #2d2a24;
        }
        .filter-btn {
            transition: all 0.15s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .filter-btn:active {
            transform: scale(0.95);
        }
        .status-badge {
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 600;
        }
        .status-badge.done {
            background: #d4edda;
            color: #1f7a47;
        }
        .status-badge.pending {
            background: #f1e5cf;
            color: #8b6f3f;
        }
    </style>
</head>
<body class="bg-[#f2ede6] font-sans antialiased pb-24">

    <script>
        // ================================================================
        //  DATA & STATE
        // ================================================================
        const DEDAK_KEY = 'bisnis_dedak';

        let pengambilan = [];
        let tempat = [];
        let editingPengambilanId = null;
        let editingTempatId = null;
        let filterPengambilan = 'semua';
        let filterTempat = 'semua';
        let showAllPengambilan = false;
        let showAllTempat = false;

        // ================================================================
        //  LOAD & SAVE
        // ================================================================
        function loadData() {
            const stored = localStorage.getItem(DEDAK_KEY);
            if (stored) {
                try {
                    const data = JSON.parse(stored);
                    pengambilan = data.pengambilan || [];
                    tempat = data.tempat || [];
                } catch {
                    pengambilan = [];
                    tempat = [];
                }
            } else {
                pengambilan = getPengambilanAwal();
                tempat = getTempatAwal();
                saveData();
            }
        }

        function saveData() {
            localStorage.setItem(DEDAK_KEY, JSON.stringify({
                pengambilan: pengambilan,
                tempat: tempat
            }));
        }

        //  DATA AWAL
        // ================================================================

        // ================================================================
        //  RENDER
        // ================================================================
        function formatRupiah(n) {
            return 'Rp ' + n.toLocaleString('id-ID');
        }

        function renderUniversalFilter({
    wrapId,
    items,
    activeValue,
    dataKey,
    getLabel,
    onClick
}) {

    const wrap = document.getElementById(wrapId);

    let html = "";

    items.forEach(item => {

        html += `
            <button
                class="filter-btn px-4 py-1.5 rounded-full border-2 border-[#d6cbbc] text-sm font-medium ${
                    activeValue === item
                        ? "active bg-[#2d2a24] text-white border-[#2d2a24]"
                        : "bg-white text-[#4d4337]"
                }"
                data-${dataKey}="${item}">
                ${getLabel(item)}
            </button>
        `;

    });

    wrap.innerHTML = html;

    wrap.querySelectorAll(".filter-btn").forEach(btn => {

        btn.onclick = function () {

            onClick(this.dataset[dataKey]);

        };

    });

}

        // ===== PENGAMBILAN =====
        function renderPengambilanFilter() {

    renderUniversalFilter({

        wrapId: "filterPengambilanWrap",

        items: ["semua","done","pending"],

        activeValue: filterPengambilan,

        dataKey: "status",

        getLabel(item){

            if(item==="semua") return "📋 Semua";
            if(item==="done") return "✅ Selesai";
            return "⏳ Menunggu";

        },

        onClick(value){

    filterPengambilan = value;
    showAllPengambilan = false;

    renderPengambilanFilter();
    renderPengambilan();

}

    });

}

        function renderPengambilan() {
            const list = document.getElementById('pengambilanList');
            const judul = document.getElementById('judulPengambilan');
            const jumlah = document.getElementById('jumlahPengambilan');

            let filtered = pengambilan;
            if (filterPengambilan !== 'semua') {
                filtered = filtered.filter(p => p.status === filterPengambilan);
            }

            // Sort by nomor descending (terbesar dulu)
            filtered.sort((a, b) => b.nomor - a.nomor);

            // Tampilkan 5 terakhir atau semua
            const displayed = showAllPengambilan ? filtered : filtered.slice(0, 5);

            const statusLabel = filterPengambilan === 'semua' ? 'Semua' : 
                               filterPengambilan === 'done' ? 'Selesai' : 'Menunggu';
            judul.textContent = `📋 Pengambilan ${statusLabel}`;
            jumlah.textContent = `${filtered.length} item`;

            if (displayed.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-12 text-[#8a7d6b]">
                        <span class="text-4xl block mb-2">📦</span>
                        <p>Belum ada data pengambilan</p>
                        <p class="text-sm">Klik "Tambah Pengambilan" untuk mulai</p>
                    </div>
                `;
                return;
            }

            let html = '';
            displayed.forEach(p => {
                const statusClass = p.status;
                const statusLabel2 = p.status === 'done' ? '✅ Selesai' : '⏳ Menunggu';

                html += `
                    <div class="bg-white rounded-2xl px-4 py-3 flex justify-between items-center shadow-sm border border-[#e8dfd3] item-card cursor-pointer" data-id="${p.id}">
                        <div class="flex-1 min-w-0">
                            <span class="text-xs text-[#8a7d6b] font-medium">#${p.nomor}</span>
                            <p class="text-sm font-medium text-[#2d2a24]">${p.tgl}</p>
                        </div>
                        <div class="flex items-center gap-3 flex-shrink-0 ml-3">
                            <span class="status-badge ${statusClass}">${statusLabel2}</span>
                            <button class="btn-del-pengambilan text-[#b1a18c] hover:text-red-500 text-lg px-1" data-id="${p.id}">✕</button>
                        </div>
                    </div>
                `;
            });

            list.innerHTML = html;

            list.querySelectorAll('.item-card').forEach(item => {
                item.addEventListener('click', function(e) {
                    if (e.target.closest('.btn-del-pengambilan')) return;
                    const id = parseFloat(this.dataset.id);
                    editPengambilan(id);
                });
            });

            list.querySelectorAll('.btn-del-pengambilan').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const id = parseFloat(this.dataset.id);
                    if (confirm('Hapus data pengambilan ini?')) {
                        hapusPengambilan(id);
                    }
                });
            });

            // Tombol Lihat Semua
            const btnLihat = document.getElementById('btnLihatSemuaPengambilan');
            if (filtered.length > 5) {
                btnLihat.classList.remove('hidden');
                btnLihat.textContent = showAllPengambilan ? '📊 Tampilkan 5 Terakhir' :
                    `📊 Lihat Semua (${filtered.length} item)`;
            } else {
                btnLihat.classList.add('hidden');
            }

            document.getElementById('totalPengambilanCount').textContent = pengambilan.length;
            const done = pengambilan.filter(p => p.status === 'done').length;
            document.getElementById('statusPengambilan').textContent = `${done}/${pengambilan.length}`;
        }

        // ===== TEMPAT =====
        function renderTempatFilter(){

    const bulanSet=new Set();

    tempat.forEach(t=>{

        const p=t.tgl.split(" ");

        if(p.length>=3){

            bulanSet.add(p[1]+" "+p[2]);

        }

    });

    const bulanList=["semua",...Array.from(bulanSet).sort()];

    renderUniversalFilter({

        wrapId:"filterTempatWrap",

        items:bulanList,

        activeValue:filterTempat,

        dataKey:"filter",

        getLabel(item){

            return item==="semua"
                ? "📅 Semua"
                : item;

        },

        onClick(value){

    filterTempat = value;
    showAllTempat = false;

    renderTempatFilter();
    renderTempat();

}

    });

}

        function renderTempat() {
            const list = document.getElementById('tempatList');
            const judul = document.getElementById('judulTempat');
            const jumlah = document.getElementById('jumlahTempat');

            let filtered = tempat;
            if (filterTempat !== 'semua') {
                filtered = filtered.filter(t => t.tgl.includes(filterTempat));
            }

            // Sort by nomor descending (terbesar dulu)
            filtered.sort((a, b) => b.nomor - a.nomor);

            // Tampilkan 5 terakhir atau semua
            const displayed = showAllTempat ? filtered : filtered.slice(0, 5);

            const bulanLabel = filterTempat === 'semua' ? 'Semua' : filterTempat;
            judul.textContent = `🏪 Transaksi Tempat ${bulanLabel}`;
            jumlah.textContent = `${filtered.length} item`;

            if (displayed.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-12 text-[#8a7d6b]">
                        <span class="text-4xl block mb-2">🏪</span>
                        <p>Belum ada transaksi tempat</p>
                        <p class="text-sm">Klik "Tambah Transaksi Tempat" untuk mulai</p>
                    </div>
                `;
                return;
            }

            let html = '';
            displayed.forEach(t => {
                html += `
                    <div class="bg-white rounded-2xl px-4 py-3 shadow-sm border border-[#e8dfd3] item-card cursor-pointer" data-id="${t.id}">
                        <div class="flex justify-between items-start">
                            <div class="flex-1 min-w-0">
                                <span class="text-xs text-[#8a7d6b] font-medium">#${t.nomor} • ${t.tgl}</span>
                                <p class="text-sm font-medium text-[#2d2a24] mt-1">${t.desc}</p>
                            </div>
                            <div class="flex items-center gap-3 flex-shrink-0 ml-3">
                                <span class="font-bold text-sm text-green-700">${formatRupiah(t.profit)}</span>
                                <button class="btn-del-tempat text-[#b1a18c] hover:text-red-500 text-lg px-1" data-id="${t.id}">✕</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            list.innerHTML = html;

            list.querySelectorAll('.item-card').forEach(item => {
                item.addEventListener('click', function(e) {
                    if (e.target.closest('.btn-del-tempat')) return;
                    const id = parseFloat(this.dataset.id);
                    editTempat(id);
                });
            });

            list.querySelectorAll('.btn-del-tempat').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const id = parseFloat(this.dataset.id);
                    if (confirm('Hapus transaksi ini?')) {
                        hapusTempat(id);
                    }
                });
            });

            // Tombol Lihat Semua
            const btnLihat = document.getElementById('btnLihatSemuaTempat');
            if (filtered.length > 5) {
                btnLihat.classList.remove('hidden');
                btnLihat.textContent = showAllTempat ? '📊 Tampilkan 5 Terakhir' :
                    `📊 Lihat Semua (${filtered.length} item)`;
            } else {
                btnLihat.classList.add('hidden');
            }

            document.getElementById('totalTransaksiTempat').textContent = tempat.length;
            const totalProfit = tempat.reduce((sum, t) => sum + t.profit, 0);
            document.getElementById('totalProfit').textContent = formatRupiah(totalProfit);
        }

        // ===== REKAP =====
        function renderRekap() {
            const totalProfit = tempat.reduce((sum, t) => sum + t.profit, 0);
            const totalPengambilan = pengambilan.length;
            const donePengambilan = pengambilan.filter(p => p.status === 'done').length;

            document.getElementById('totalProfit').textContent = formatRupiah(totalProfit);
            document.getElementById('totalTransaksiTempat').textContent = tempat.length;
            document.getElementById('totalPengambilanCount').textContent = totalPengambilan;
            document.getElementById('statusPengambilan').textContent = `${donePengambilan}/${totalPengambilan}`;

            const detail = document.getElementById('rekapDetail');
            detail.innerHTML = `
                <div class="flex justify-between py-1 border-b border-[#f0e9df]">
                    <span class="text-[#8a7d6b]">Total Profit</span>
                    <span class="font-semibold text-green-700">${formatRupiah(totalProfit)}</span>
                </div>
                <div class="flex justify-between py-1 border-b border-[#f0e9df]">
                    <span class="text-[#8a7d6b]">Total Pengambilan</span>
                    <span class="font-semibold">${totalPengambilan}</span>
                </div>
                <div class="flex justify-between py-1 border-b border-[#f0e9df]">
                    <span class="text-[#8a7d6b]">Selesai</span>
                    <span class="font-semibold text-green-700">${donePengambilan}</span>
                </div>
                <div class="flex justify-between py-1">
                    <span class="text-[#8a7d6b]">Menunggu</span>
                    <span class="font-semibold text-yellow-700">${totalPengambilan - donePengambilan}</span>
                </div>
                <div class="flex justify-between py-2 mt-2 border-t-2 border-[#d6cbbc]">
                    <span class="font-semibold">Total Transaksi Tempat</span>
                    <span class="font-semibold">${tempat.length}</span>
                </div>
            `;
        }

        // ================================================================
        //  CRUD PENGAMBILAN
        // ================================================================
        function tambahPengambilan(nomor, tgl, status) {
            const newP = { id: Date.now() + Math.random() * 1000, nomor: parseInt(nomor), tgl: tgl.trim(), status };
            pengambilan.push(newP);
            saveData();
            renderPengambilan();
        }

        function editPengambilan(id) {
            const p = pengambilan.find(item => item.id === id);
            if (!p) return;
            editingPengambilanId = id;
            document.getElementById('modalPengambilanTitle').textContent = 'Edit Pengambilan';
            document.getElementById('inputPengambilanNomor').value = p.nomor;
            document.getElementById('inputPengambilanTgl').value = p.tgl;
            document.getElementById('inputPengambilanStatus').value = p.status;
            document.getElementById('btnHapusPengambilan').classList.remove('hidden');
            document.getElementById('modalPengambilanOverlay').classList.remove('hidden');
        }

        function simpanPengambilan() {
            const nomor = document.getElementById('inputPengambilanNomor').value;
            const tgl = document.getElementById('inputPengambilanTgl').value.trim();
            const status = document.getElementById('inputPengambilanStatus').value;

            if (!nomor || !tgl) {
                alert('Harap isi Nomor dan Tanggal!');
                return;
            }

            if (editingPengambilanId) {
                const idx = pengambilan.findIndex(p => p.id === editingPengambilanId);
                if (idx !== -1) {
                    pengambilan[idx] = { ...pengambilan[idx], nomor: parseInt(nomor), tgl, status };
                    saveData();
                    renderPengambilan();
                }
                editingPengambilanId = null;
            } else {
                tambahPengambilan(nomor, tgl, status);
            }
            closeModalPengambilan();
        }

        function hapusPengambilan(id) {
            pengambilan = pengambilan.filter(p => p.id !== id);
            saveData();
            renderPengambilan();
            if (editingPengambilanId === id) closeModalPengambilan();
        }

        function closeModalPengambilan() {
            document.getElementById('modalPengambilanOverlay').classList.add('hidden');
            document.getElementById('btnHapusPengambilan').classList.add('hidden');
            editingPengambilanId = null;
            document.getElementById('modalPengambilanTitle').textContent = 'Tambah Pengambilan';
            document.getElementById('inputPengambilanNomor').value = '';
            document.getElementById('inputPengambilanTgl').value = '';
            document.getElementById('inputPengambilanStatus').value = 'done';
        }

        // ================================================================
        //  CRUD TEMPAT
        // ================================================================
        function tambahTempat(nomor, tgl, desc, profit) {
            const newT = { id: Date.now() + Math.random() * 1000, nomor: parseInt(nomor), tgl: tgl.trim(), desc: desc.trim(),
                profit: parseInt(profit) };
            tempat.push(newT);
            saveData();
            renderTempat();
        }

        function editTempat(id) {
            const t = tempat.find(item => item.id === id);
            if (!t) return;
            editingTempatId = id;
            document.getElementById('modalTempatTitle').textContent = 'Edit Transaksi Tempat';
            document.getElementById('inputTempatNomor').value = t.nomor;
            document.getElementById('inputTempatTgl').value = t.tgl;
            document.getElementById('inputTempatDesc').value = t.desc;
            document.getElementById('inputTempatProfit').value = t.profit;
            document.getElementById('btnHapusTempat').classList.remove('hidden');
            document.getElementById('modalTempatOverlay').classList.remove('hidden');
        }

        function simpanTempat() {
            const nomor = document.getElementById('inputTempatNomor').value;
            const tgl = document.getElementById('inputTempatTgl').value.trim();
            const desc = document.getElementById('inputTempatDesc').value.trim();
            const profit = parseInt(document.getElementById('inputTempatProfit').value);

            if (!nomor || !tgl || !desc || !profit || profit <= 0) {
                alert('Harap isi semua data dengan benar!');
                return;
            }

            if (editingTempatId) {
                const idx = tempat.findIndex(t => t.id === editingTempatId);
                if (idx !== -1) {
                    tempat[idx] = { ...tempat[idx], nomor: parseInt(nomor), tgl, desc, profit };
                    saveData();
                    renderTempat();
                }
                editingTempatId = null;
            } else {
                tambahTempat(nomor, tgl, desc, profit);
            }
            closeModalTempat();
        }

        function hapusTempat(id) {
            tempat = tempat.filter(t => t.id !== id);
            saveData();
            renderTempat();
            if (editingTempatId === id) closeModalTempat();
        }

        function closeModalTempat() {
            document.getElementById('modalTempatOverlay').classList.add('hidden');
            document.getElementById('btnHapusTempat').classList.add('hidden');
            editingTempatId = null;
            document.getElementById('modalTempatTitle').textContent = 'Tambah Transaksi Tempat';
            document.getElementById('inputTempatNomor').value = '';
            document.getElementById('inputTempatTgl').value = '';
            document.getElementById('inputTempatDesc').value = '';
            document.getElementById('inputTempatProfit').value = '';
        }

        // ================================================================
        //  RESET DATA
        // ================================================================
        function resetData() {
            if (confirm('Yakin ingin menghapus SEMUA data Bisnis Dedak?')) {
                if (confirm('Data akan hilang permanen! Lanjutkan?')) {
                    localStorage.removeItem(DEDAK_KEY);
                    pengambilan = getPengambilanAwal();
                    tempat = getTempatAwal();
                    saveData();
                    renderAll();
                }
            }
        }

        // ================================================================
        //  RENDER ALL & TAB
        // ================================================================
        function renderAll() {
            renderPengambilanFilter();
            renderPengambilan();
            renderTempatFilter();
            renderTempat();
            renderRekap();
        }

        function switchTab(tab) {
            const tabs = ['pengambilan', 'tempat', 'rekap'];
            tabs.forEach(t => {
                const el = document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1));
                el.classList.toggle('hidden', t !== tab);
            });

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });

            if (tab === 'rekap') renderRekap();
        }

        function renderAll() {
    renderPengambilanFilter();
    renderPengambilan();
    renderTempatFilter();
    renderTempat();
    renderRekap();
    updateTotalItems(); // <-- TAMBAHKAN
}

function updateTotalItems() {
    const total = pengambilan.length + tempat.length;
    document.getElementById('totalItems').textContent = total + ' item';
}

function loadData() {
    const stored = localStorage.getItem(DEDAK_KEY);
    if (stored) {
        try {
            const data = JSON.parse(stored);
            pengambilan = data.pengambilan || [];
            tempat = data.tempat || [];
        } catch {
            pengambilan = [];
            tempat = [];
        }
    } else {
        pengambilan = getPengambilanAwal();
        tempat = getTempatAwal();
        saveData();
    }
    updateTotalItems(); // <-- TAMBAHKAN
}

        // ================================================================
        //  EVENT LISTENERS
        // ================================================================
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            renderAll();

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    switchTab(this.dataset.tab);
                });
            });

            // ===== PENGAMBILAN =====
            document.getElementById('btnTambahPengambilan').addEventListener('click', function() {
                editingPengambilanId = null;
                document.getElementById('modalPengambilanTitle').textContent = 'Tambah Pengambilan';
                document.getElementById('btnHapusPengambilan').classList.add('hidden');
                document.getElementById('inputPengambilanNomor').value = '';
                document.getElementById('inputPengambilanTgl').value = '';
                document.getElementById('inputPengambilanStatus').value = 'done';
                document.getElementById('modalPengambilanOverlay').classList.remove('hidden');
            });

            document.getElementById('btnSimpanPengambilan').addEventListener('click', simpanPengambilan);
            document.getElementById('btnBatalPengambilan').addEventListener('click', closeModalPengambilan);

            document.getElementById('btnHapusPengambilan').addEventListener('click', function() {
                if (editingPengambilanId && confirm('Yakin hapus data ini?')) {
                    hapusPengambilan(editingPengambilanId);
                }
            });

            document.getElementById('modalPengambilanOverlay').addEventListener('click', function(e) {
                if (e.target === this) closeModalPengambilan();
            });

            document.getElementById('btnLihatSemuaPengambilan').addEventListener('click', function() {
                showAllPengambilan = !showAllPengambilan;
                renderPengambilan();
            });

            // ===== TEMPAT =====
            document.getElementById('btnTambahTempat').addEventListener('click', function() {
                editingTempatId = null;
                document.getElementById('modalTempatTitle').textContent = 'Tambah Transaksi Tempat';
                document.getElementById('btnHapusTempat').classList.add('hidden');
                document.getElementById('inputTempatNomor').value = '';
                document.getElementById('inputTempatTgl').value = '';
                document.getElementById('inputTempatDesc').value = '';
                document.getElementById('inputTempatProfit').value = '';
                document.getElementById('modalTempatOverlay').classList.remove('hidden');
            });

            document.getElementById('btnSimpanTempat').addEventListener('click', simpanTempat);
            document.getElementById('btnBatalTempat').addEventListener('click', closeModalTempat);

            document.getElementById('btnHapusTempat').addEventListener('click', function() {
                if (editingTempatId && confirm('Yakin hapus data ini?')) {
                    hapusTempat(editingTempatId);
                }
            });

            document.getElementById('modalTempatOverlay').addEventListener('click', function(e) {
                if (e.target === this) closeModalTempat();
            });

            document.getElementById('btnLihatSemuaTempat').addEventListener('click', function() {
                showAllTempat = !showAllTempat;
                renderTempat();
            });

            // ===== RESET =====
            document.getElementById('btnResetData').addEventListener('click', resetData);

            // Enter key
            document.getElementById('inputPengambilanNomor').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') simpanPengambilan();
            });
            document.getElementById('inputTempatProfit').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') simpanTempat();
            });
        });
    </script>

</body>
</html>
